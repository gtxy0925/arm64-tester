name: Build ARM64 Live RAM Tester (20.04 & 24.04)

on:
  workflow_dispatch:

jobs:
  build-live:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - ubuntu_ver: "20.04"
            codename: "focal"
          - ubuntu_ver: "24.04"
            codename: "noble"
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU (GitHub原生支持此项，绝对不报格式错误)
      uses: docker/setup-qemu-action@v3

    - name: Build Live RAM System
      run: |
        sudo apt update && sudo apt install -y debootstrap binfmt-support qemu-user-static
        
        mkdir -p squashfs-root output
        
        echo "正在构建 Ubuntu ${{ matrix.ubuntu_ver }} 核心根系统..."
        sudo debootstrap --arch=arm64 ${{ matrix.codename }} squashfs-root http://ports.ubuntu.com/ubuntu-ports/
        
        sudo cp /usr/bin/qemu-aarch64-static squashfs-root/usr/bin/
        sudo cp /etc/resolv.conf squashfs-root/etc/resolv.conf
        
        cat << 'EOF' | sudo chroot squashfs-root /bin/bash
        export DEBIAN_FRONTEND=noninteractive
        
        # 1. 补全完整的官方主源和扩展源
        CODENAME=$(cat /etc/os-release | grep VERSION_CODENAME | cut -d= -f2)
        echo "deb http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME} main restricted universe multiverse" > /etc/apt/sources.list
        echo "deb http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-updates main restricted universe multiverse" >> /etc/apt/sources.list
        echo "deb http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-security main restricted universe multiverse" >> /etc/apt/sources.list
        
        apt-get update
        
        # 2. 拦截 flash-kernel 环境报错
        mkdir -p /usr/sbin
        echo -e '#!/bin/sh\nexit 0' > /usr/sbin/flash-kernel
        chmod +x /usr/sbin/flash-kernel
        
        # 3. 安装官方内核与固件
        apt-get install -y linux-image-generic linux-firmware
        
        # 4. 安装测试大礼包
        apt-get install -y stress-ng htop ipmitool iproute2 net-tools udhcpc ethtool tcpdump lm-sensors vim-tiny openssh-server memtester nvme-cli smartmontools pciutils usbutils iputils-ping curl
        
        # 5. 配置 SSH root 登录
        mkdir -p /etc/ssh
        echo "PermitRootLogin yes" >> /etc/ssh/sshd_config
        echo "root:root" | chpasswd
        
        # 6. 配置全网卡自动 DHCP
        mkdir -p /etc/network
        echo -e "auto lo\niface lo inet loopback" > /etc/network/interfaces
        for i in {0..3}; do
          echo -e "\nauto eth$i\niface eth$i inet dhcp" >> /etc/network/interfaces
        done
        
        apt-get clean
        EOF
        
        # 7. 提取内核
        cp squashfs-root/boot/vmlinuz* output/vmlinuz-${{ matrix.ubuntu_ver }}
        
        sudo rm -f squashfs-root/usr/bin/qemu-aarch64-static squashfs-root/etc/resolv.conf
        
        # 8. 【极速打包核心】：换用最快的 gzip -1 压缩，体积相差无几，但速度提升10倍，彻底解决超时问题！
        echo "正在执行闪电打包..."
        cd squashfs-root
        sudo find . | sudo cpio -o -H newc | gzip -1 > ../output/initrd-${{ matrix.ubuntu_ver }}
        cd ..
        
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ubuntu-${{ matrix.ubuntu_ver }}-LiveRAM
        path: output/
